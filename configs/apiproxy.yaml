server:
  listen: ":8080"
  read_timeout: 60s
  write_timeout: 120s
  request_timeout: 120s

auth:
  enabled: true
  # API keys can also be supplied via AUTH_API_KEYS (comma separated).
  api_keys:
    - key: "demo-key"
      client_id: "demo"

providers:
  openai:
    type: openai
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    api_key: ""
    timeout: 60s
    tier: advanced

  deepseek:
    type: openai
    base_url: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
    api_key: ""
    timeout: 60s
    tier: standard

  qwen:
    type: openai
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key_env: "DASHSCOPE_API_KEY"
    api_key: ""
    timeout: 60s
    tier: standard

  # Anthropic provider for /v1/messages (Claude Code, Anthropic clients).
  # base_url is the bare host — the provider adds /v1/messages automatically.
  anthropic:
    type: anthropic
    # Official Anthropic: https://api.anthropic.com
    # new-api / one-api gateways can also be used here; /v1 and /v1/messages
    # suffixes are accepted and normalized automatically.
    base_url: "https://api.anthropic.com"
    api_key_env: "ANTHROPIC_API_KEY"
    api_key: ""
    # Official Anthropic uses x-api-key. Many new-api/one-api gateways use
    # Authorization: Bearer instead; set auth_header: authorization for those.
    auth_header: x-api-key
    timeout: 120s
    tier: advanced

routes:
  smart-chat:
    strategy: priority
    fallback:
      enabled: true
      max_attempts: 3
      on_status: [408, 409, 425, 429, 500, 502, 503, 504]
      on_timeout: true
      on_connect_error: true
      allow_downgrade: false
    providers:
      - provider: openai
        model: gpt-4o-mini
        tier: advanced
        weight: 100
      - provider: deepseek
        model: deepseek-chat
        tier: standard
        weight: 100
      - provider: qwen
        model: qwen-plus
        tier: standard
        weight: 100

  cheap-chat:
    strategy: priority
    fallback:
      enabled: true
      max_attempts: 2
      on_status: [429, 500, 502, 503, 504]
      on_timeout: true
      on_connect_error: true
      allow_downgrade: true
    providers:
      - provider: deepseek
        model: deepseek-chat
        tier: standard
        weight: 100
      - provider: qwen
        model: qwen-plus
        tier: standard
        weight: 100

  # Anthropic /v1/messages route (transparent proxy — no format conversion).
  # Claude Code and other Anthropic clients hit /v1/messages with this model
  # name and are forwarded verbatim to the Anthropic-compatible upstream.
  claude-code:
    strategy: priority
    fallback:
      enabled: true
      max_attempts: 2
      on_status: [429, 500, 502, 503, 504, 529]
      on_timeout: true
      on_connect_error: true
    providers:
      - provider: anthropic
        model: claude-sonnet-4-5-20250929
        tier: advanced
        weight: 100

circuit_breaker:
  enabled: true
  window: 60s
  min_requests: 10
  error_rate_threshold: 0.5
  open_duration: 30s
  half_open_requests: 3

metrics:
  prometheus:
    enabled: true
    path: /metrics

storage:
  enabled: true
  path: "data/apiproxy.db"

admin:
  enabled: true
  listen: ":8081"

logging:
  level: info
  format: json
