server:
  listen: ":8080"
  read_timeout: 60s
  write_timeout: 120s
  request_timeout: 120s

auth:
  enabled: true
  # API keys can also be supplied via AUTH_API_KEYS (comma separated).
  api_keys:
    - key: "demo-key"
      client_id: "demo"

providers:
  # Transparent providers — there is no `type` field anymore. The protocol
  # (OpenAI Chat Completions vs Anthropic Messages) is decided by the client's
  # request path: /v1/chat/completions is forwarded to <base_url>/v1/chat/completions,
  # /v1/messages to <base_url>/v1/messages. One provider can serve both.
  # auth_header defaults to "both" (x-api-key + Authorization: Bearer) for max
  # upstream compatibility; set "authorization" or "x-api-key" to send only one.
  openai:
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    api_key: ""
    # Official OpenAI uses Bearer auth.
    auth_header: authorization
    timeout: 60s
    tier: advanced

  deepseek:
    base_url: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
    api_key: ""
    auth_header: authorization
    timeout: 60s
    tier: standard

  qwen:
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key_env: "DASHSCOPE_API_KEY"
    api_key: ""
    auth_header: authorization
    timeout: 60s
    tier: standard

  # Provider for /v1/messages (Claude Code, Anthropic clients).
  # base_url may be bare host or include /v1; known path suffixes are stripped
  # and the client's path is appended, so it normalizes automatically.
  anthropic:
    base_url: "https://api.anthropic.com"
    api_key_env: "ANTHROPIC_API_KEY"
    api_key: ""
    # Official Anthropic uses x-api-key. Many new-api/one-api gateways use
    # Authorization: Bearer instead; set auth_header: authorization for those,
    # or auth_header: both to emit both headers.
    auth_header: x-api-key
    timeout: 120s
    tier: advanced

routes:
  smart-chat:
    strategy: priority
    fallback:
      enabled: true
      max_attempts: 3
      on_status: [400, 404, 408, 409, 413, 425, 429, 500, 502, 503, 504]
      on_timeout: true
      on_connect_error: true
      allow_downgrade: false
    providers:
      - provider: openai
        model: gpt-4o-mini
        tier: advanced
        weight: 100
      - provider: deepseek
        model: deepseek-chat
        tier: standard
        weight: 100
      - provider: qwen
        model: qwen-plus
        tier: standard
        weight: 100

  cheap-chat:
    strategy: priority
    fallback:
      enabled: true
      max_attempts: 2
      on_status: [400, 404, 408, 413, 429, 500, 502, 503, 504]
      on_timeout: true
      on_connect_error: true
      allow_downgrade: true
    providers:
      - provider: deepseek
        model: deepseek-chat
        tier: standard
        weight: 100
      - provider: qwen
        model: qwen-plus
        tier: standard
        weight: 100

  # Anthropic /v1/messages route (transparent proxy — no format conversion).
  # Claude Code and other Anthropic clients hit /v1/messages with this model
  # name and are forwarded verbatim to the Anthropic-compatible upstream.
  claude-code:
    strategy: priority
    fallback:
      enabled: true
      max_attempts: 2
      on_status: [400, 404, 408, 413, 429, 500, 502, 503, 504, 529]
      on_timeout: true
      on_connect_error: true
    providers:
      - provider: anthropic
        model: claude-sonnet-4-5-20250929
        tier: advanced
        weight: 100

circuit_breaker:
  enabled: true
  window: 60s
  min_requests: 10
  error_rate_threshold: 0.5
  open_duration: 30s
  half_open_requests: 3

metrics:
  prometheus:
    enabled: true
    path: /metrics

storage:
  enabled: true
  path: "data/apiproxy.db"

admin:
  enabled: true
  listen: ":8081"
  # Credentials are read from these env vars. Set them before starting:
  #   export APIPROXY_ADMIN_USER=admin
  #   export APIPROXY_ADMIN_PASS=$(openssl rand -base64 24)
  # Defaults to env var names APIPROXY_ADMIN_USER / APIPROXY_ADMIN_PASS.
  username_env: "APIPROXY_ADMIN_USER"
  password_env: "APIPROXY_ADMIN_PASS"

logging:
  level: info
  format: json
  file:
    # Enabled by default: logs are also written to detail-YYYYMMDD.log under
    # dir (in addition to stdout). Non-current-day files are gzipped to
    # .log.gz; files older than max_days are deleted. max_size is per-file MB
    # (size-exceeded files roll into detail-YYYYMMDD.N.log). Set enabled: false
    # to disable file logging.
    enabled: true
    dir: "logs"
    max_days: 7
    max_size: 100
